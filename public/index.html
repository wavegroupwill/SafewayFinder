<head>
  <meta charset="UTF-8">

<div id="root"></div>

<script>
  window.storage = {
    get: (key) => Promise.resolve({ value: localStorage.getItem(key) }),
    set: (key, value) => { localStorage.setItem(key, value); return Promise.resolve(); }
  };
</script>

  accentText: '#fff', confirmed: '#3d9970', custom: '#9b6fd6',
  typical: '#5a9fc5', rowAlt: '#161618', inputBg: '#1c1c1e',
  pillBg: '#2c2c2e', placeholder: '#555', mutedBtn: '#666',
  secondaryBtn: '#2c2c2e', secondaryBtnText: '#aaa',

const DEFAULT_STORES = {
  store_1: { name: "My Safeway", size: "large", map: { ...DEFAULT_MAP } },
};

const systemPrompt = (store, storeMap) => {
  const confirmed = Object.entries(storeMap).filter(([,v]) => v.confidence === "confirmed" || v.confidence === "custom");
  const anchors = confirmed.length > 0
    ? `\nConfirmed aisle anchors:\n${confirmed.map(([k,v]) => `  ${k} → ${v.zone}`).join("\n")}`
    : "";
  return `You are a grocery store assistant for a ${store.size === "small" ? "smaller neighborhood" : "full-size"} Safeway called "${store.name}".
${store.size === "small" ? "Note: smaller store — some specialty sections may be limited or combined." : ""}

Store map ("confirmed" = user-verified; "typical" = general Safeway convention; "custom" = user-added):
${JSON.stringify(storeMap, null, 2)}
${anchors}

Rules:
- Match the query to the closest key or category in the map
- Prefer confirmed/custom entries over typical ones
- If the item is not confirmed but is typically found in the same zone as a confirmed item, use that confirmed aisle number as your answer and add a short note like "(same aisle as coffee)"
- Be concise — one short location, plain language, no jargon
- If you know a specific aisle number from confirmed data, always use it

Respond ONLY as JSON, no markdown:
{"aisle": "short location", "confidence": "confirmed|typical|guess", "note": "optional, omit if not useful"}`;
};

const badgeInfo = (c) => ({
  confirmed: { bg: "#2d6a4f", label: "✓ confirmed" },
  custom:    { bg: "#7b4fa6", label: "★ custom" },
  typical:   { bg: "#4a7fa5", label: "~ typical" },
  guess:     { bg: "#888",    label: "? guess" },
}[c] || { bg: "#888", label: "? guess" });

// ── Store Modal ───────────────────────────────────────────────────────────────
function StoreModal({ stores, activeId, onSelect, onSave, onClose, C }) {
  const [editId, setEditId] = useState(null);
  const [draft, setDraft] = useState({});
  const [newName, setNewName] = useState("");
  const [newSize, setNewSize] = useState("large");
  const [adding, setAdding] = useState(false);

  const startEdit = (id) => { setEditId(id); setDraft({ name: stores[id].name, size: stores[id].size }); };
  const saveEdit = () => { onSave(editId, draft.name, draft.size); setEditId(null); };
  const addStore = () => {
    if (!newName.trim()) return;
    const id = "store_" + Date.now();
    onSave(id, newName.trim(), newSize, true);
    setNewName(""); setNewSize("large"); setAdding(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center", padding: 0 }}
         onClick={onClose}>
      <div style={{ background: C.card, borderRadius: "16px 16px 0 0", width: "100%", maxWidth: 500, boxShadow: "0 -4px 32px rgba(0,0,0,0.2)", paddingBottom: "env(safe-area-inset-bottom, 16px)" }}
           onClick={e => e.stopPropagation()}>
        <div style={{ padding: "20px 20px 14px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 16, fontWeight: 600, color: C.text }}>Manage Stores</span>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, color: C.subtext, cursor: "pointer", padding: "0 4px" }}>×</button>
        </div>
        <div style={{ padding: "8px 20px", maxHeight: "60vh", overflowY: "auto" }}>
          {Object.entries(stores).map(([id, store]) => (
            <div key={id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 0", borderBottom: `1px solid ${C.borderLight}` }}>
              {editId === id ? (
                <>
                  <input value={draft.name} onChange={(e) => setDraft({ ...draft, name: e.target.value })}
                    style={{ flex: 1, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 12px", fontSize: 15, background: C.inputBg, color: C.text }} />
                  <select value={draft.size} onChange={(e) => setDraft({ ...draft, size: e.target.value })}
                    style={{ border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 8px", fontSize: 13, background: C.inputBg, color: C.text }}>
                    <option value="large">large</option>
                    <option value="small">small</option>
                  </select>
                  <button onClick={saveEdit} style={{ background: C.confirmed, color: "#fff", border: "none", borderRadius: 8, padding: "10px 16px", fontSize: 13, cursor: "pointer" }}>Save</button>
                </>
              ) : (
                <>
                  <button onClick={() => { onSelect(id); onClose(); }} style={{ flex: 1, background: "none", border: "none", textAlign: "left", cursor: "pointer", padding: 0 }}>
                    <span style={{ fontSize: 16, color: id === activeId ? C.accent : C.text }}>
                      {id === activeId ? "▸ " : "\u00a0\u00a0"}{store.name}
                    </span>
                    <span style={{ marginLeft: 8, fontSize: 11, color: C.subtext, background: C.pillBg, padding: "2px 8px", borderRadius: 8 }}>{store.size}</span>
                  </button>
                  <button onClick={() => startEdit(id)} style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 14px", fontSize: 13, color: C.subtext, cursor: "pointer" }}>edit</button>
                </>
              )}
            </div>
          ))}
          {adding ? (
            <div style={{ display: "flex", gap: 8, marginTop: 12, alignItems: "center" }}>
              <input value={newName} onChange={(e) => setNewName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addStore()}
                placeholder="Store name…" autoFocus
                style={{ flex: 1, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 12px", fontSize: 15, background: C.inputBg, color: C.text }} />
              <select value={newSize} onChange={(e) => setNewSize(e.target.value)}
                style={{ border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 8px", fontSize: 13, background: C.inputBg, color: C.text }}>
                <option value="large">large</option>
                <option value="small">small</option>
              </select>
              <button onClick={addStore} style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 8, padding: "10px 16px", fontSize: 13, cursor: "pointer" }}>Add</button>
            </div>
          ) : (
            <button onClick={() => setAdding(true)} style={{ marginTop: 12, background: "none", border: `1px dashed ${C.border}`, borderRadius: 8, width: "100%", padding: "12px 0", fontSize: 14, color: C.subtext, cursor: "pointer" }}>+ add store</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Add Category Panel ────────────────────────────────────────────────────────
function AddCategoryPanel({ onAdd, C }) {
  const [open, setOpen] = useState(false);
  const [cat, setCat] = useState("");
  const [loc, setLoc] = useState("");

  const submit = () => {
    if (!cat.trim() || !loc.trim()) return;
    onAdd(cat.trim().toLowerCase(), loc.trim());
    setCat(""); setLoc(""); setOpen(false);
  };

  if (!open) return (
    <button onClick={() => setOpen(true)} style={{
      background: "none", border: `1.5px dashed ${C.border}`, borderRadius: 10,
      width: "100%", padding: "14px 0", fontSize: 14, color: C.subtext, cursor: "pointer",
    }}>+ teach this store a new location</button>
  );

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18 }}>
      <div style={{ fontSize: 12, color: C.subtext, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>New location</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <input value={cat} onChange={(e) => setCat(e.target.value)}
          placeholder="Item or category (e.g. kombucha, vegan cheese)"
          style={{ border: `1px solid ${C.border}`, borderRadius: 8, padding: "13px 14px", fontSize: 15, background: C.inputBg, color: C.text }} />
        <input value={loc} onChange={(e) => setLoc(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && submit()}
          placeholder="Where is it? (e.g. Aisle 6, Natural foods)"
          style={{ border: `1px solid ${C.border}`, borderRadius: 8, padding: "13px 14px", fontSize: 15, background: C.inputBg, color: C.text }} />
        <div style={{ display: "flex", gap: 8, marginTop: 2 }}>
          <button onClick={submit} disabled={!cat.trim() || !loc.trim()} style={{
            flex: 1, background: C.custom, color: "#fff", border: "none",
            borderRadius: 8, padding: "13px 0", fontSize: 15, cursor: "pointer",
            opacity: (!cat.trim() || !loc.trim()) ? 0.4 : 1,
          }}>★ Save to this store</button>
          <button onClick={() => { setOpen(false); setCat(""); setLoc(""); }} style={{
            background: C.secondaryBtn, color: C.secondaryBtnText, border: "none",
            borderRadius: 8, padding: "13px 18px", fontSize: 15, cursor: "pointer",
          }}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function SafewayFinder() {
  const [stores, setStores]       = useState(null);
  const [activeId, setActiveId]   = useState("store_1");
  const [query, setQuery]         = useState("");
  const [result, setResult]       = useState(null);
  const [loading, setLoading]     = useState(false);
  const [correcting, setCorrecting] = useState(false);
  const [correction, setCorrection] = useState("");
  const [showMap, setShowMap]     = useState(false);
  const [tab, setTab]             = useState("confirmed");
  const [showModal, setShowModal] = useState(false);
  const [showDropdown, setShowDropdown] = useState(false);
  const [dark, setDark]           = useState(() => localStorage.getItem(DARK_KEY) === "1");

  const C = dark ? DARK : LIGHT;
  const dropdownRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const [s, a] = await Promise.allSettled([window.storage.get(STORES_KEY), window.storage.get(ACTIVE_KEY)]);
        const loadedStores = s.status === "fulfilled" && s.value?.value ? JSON.parse(s.value.value) : DEFAULT_STORES;
        const loadedActive = a.status === "fulfilled" && a.value?.value ? a.value.value : Object.keys(loadedStores)[0];
        setStores(loadedStores);
        setActiveId(loadedActive);
      } catch { setStores(DEFAULT_STORES); }
    })();
  }, []);

  // Close dropdown on outside tap
  useEffect(() => {
    if (!showDropdown) return;
    const handler = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setShowDropdown(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };
  }, [showDropdown]);

  const toggleDark = () => {
    const next = !dark;
    setDark(next);
    localStorage.setItem(DARK_KEY, next ? "1" : "0");
  };

  const persist = async (updatedStores, newActiveId) => {
    setStores(updatedStores);
    try {
      await window.storage.set(STORES_KEY, JSON.stringify(updatedStores));
      if (newActiveId) await window.storage.set(ACTIVE_KEY, newActiveId);
    } catch (_) {}
  };

  const switchStore = (id) => {
    setActiveId(id); setResult(null); setQuery("");
    window.storage.set(ACTIVE_KEY, id).catch(() => {});
    setShowDropdown(false);
  };

  const handleSaveStore = (id, name, size, isNew = false) => {
    const updated = { ...stores };
    updated[id] = isNew ? { name, size, map: { ...DEFAULT_MAP } } : { ...updated[id], name, size };
    persist(updated, isNew ? id : undefined);
    if (isNew) setActiveId(id);
  };

  const saveMap = async (updatedMap) => {
    const updated = { ...stores, [activeId]: { ...stores[activeId], map: updatedMap } };
    await persist(updated);
  };

  const handleAddCustom = async (cat, loc) => {
    const updated = { ...stores[activeId].map, [cat]: { zone: loc, confidence: "custom" } };
    await saveMap(updated);
  };

  const search = async () => {
    if (!query.trim() || loading || !stores) return;
    setLoading(true); setResult(null); setCorrecting(false);
    const store = stores[activeId];
    try {
      const res = await fetch("/api/claude", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system: systemPrompt(store, store.map),
          messages: [{ role: "user", content: `Where is: ${query}` }],
        }),
      });
      const data = await res.json();
      const text = data.content?.find((b) => b.type === "text")?.text || "{}";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      setResult({ item: query, ...parsed });
    } catch {
      setResult({ item: query, aisle: "Something went wrong — try again", confidence: "guess" });
    }
    setLoading(false);
  };

  const confirm = async () => {
    const updated = { ...stores[activeId].map, [result.item.toLowerCase()]: { zone: result.aisle, confidence: "confirmed" } };
    await saveMap(updated);
    setResult((r) => ({ ...r, confirmed: true }));
  };

  const submitCorrection = async () => {
    if (!correction.trim()) return;
    const updated = { ...stores[activeId].map, [result.item.toLowerCase()]: { zone: correction, confidence: "confirmed" } };
    await saveMap(updated);
    setResult((r) => ({ ...r, aisle: correction, confirmed: true, confidence: "confirmed" }));
    setCorrecting(false); setCorrection("");
  };

  if (!stores) return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", color: C.subtext, fontSize: 16 }}>
      Loading…
    </div>
  );

  const activeStore = stores[activeId];
  const storeMap = activeStore.map;
  const confirmedEntries = Object.entries(storeMap).filter(([,v]) => v.confidence === "confirmed");
  const customEntries    = Object.entries(storeMap).filter(([,v]) => v.confidence === "custom");
  const typicalEntries   = Object.entries(storeMap).filter(([,v]) => v.confidence === "typical");
  const tabEntries = { confirmed: confirmedEntries, custom: customEntries, typical: typicalEntries };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, display: "flex", flexDirection: "column", alignItems: "center", paddingBottom: 60 }}>

      {showModal && <StoreModal stores={stores} activeId={activeId} onSelect={switchStore} onSave={handleSaveStore} onClose={() => setShowModal(false)} C={C} />}

      {/* Header */}
      <div style={{ width: "100%", maxWidth: 500, padding: "56px 20px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: C.subtext }}>SAFEWAY</span>
            <span style={{ color: C.border, fontSize: 10 }}>•</span>
            <span style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: C.accent }}>ITEM FINDER</span>
          </div>
          <button onClick={toggleDark} style={{
            background: C.pillBg, border: "none", borderRadius: 20,
            padding: "6px 14px", fontSize: 12, color: C.subtext, cursor: "pointer",
          }}>{dark ? "☀ light" : "◑ dark"}</button>
        </div>

        <h1 style={{ fontSize: 34, fontWeight: 300, margin: "6px 0 20px", color: C.text, letterSpacing: "-0.02em", fontFamily: "Georgia, serif" }}>
          Where is it?
        </h1>

        {/* Store switcher */}
        <div style={{ position: "relative" }} ref={dropdownRef}>
          <button onClick={() => setShowDropdown(v => !v)} style={{
            width: "100%", background: C.card, border: `1.5px solid ${C.border}`,
            borderRadius: 10, padding: "14px 16px", fontSize: 16,
            color: C.text, cursor: "pointer", display: "flex",
            justifyContent: "space-between", alignItems: "center",
            fontFamily: "Georgia, serif",
          }}>
            <span>{activeStore.name}</span>
            <span style={{ fontSize: 12, color: C.subtext }}>{showDropdown ? "▲" : "▼"}</span>
          </button>

          {showDropdown && (
            <div style={{
              position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0,
              background: C.card, border: `1px solid ${C.border}`, borderRadius: 10,
              boxShadow: "0 8px 24px rgba(0,0,0,0.15)", zIndex: 50, overflow: "hidden",
            }}>
              {Object.entries(stores).map(([id, store]) => (
                <button key={id} onClick={() => switchStore(id)} style={{
                  width: "100%", background: id === activeId ? C.pillBg : "none",
                  border: "none", borderBottom: `1px solid ${C.borderLight}`,
                  padding: "14px 16px", fontSize: 16, color: id === activeId ? C.accent : C.text,
                  cursor: "pointer", textAlign: "left", display: "flex",
                  alignItems: "center", justifyContent: "space-between",
                  fontFamily: "Georgia, serif",
                }}>
                  <span>{id === activeId ? "▸ " : "\u00a0\u00a0"}{store.name}</span>
                  <span style={{ fontSize: 11, color: C.subtext, background: C.pillBg, padding: "2px 8px", borderRadius: 8 }}>{store.size}</span>
                </button>
              ))}
              <button onClick={() => { setShowDropdown(false); setShowModal(true); }} style={{
                width: "100%", background: "none", border: "none",
                padding: "12px 16px", fontSize: 13, color: C.subtext,
                cursor: "pointer", textAlign: "left",
              }}>⚙ manage stores</button>
            </div>
          )}
        </div>

        {/* Stats line */}
        <p style={{ fontSize: 12, color: C.subtext, marginTop: 8, marginBottom: 0 }}>
          {confirmedEntries.length + customEntries.length > 0
            ? `${confirmedEntries.length} confirmed · ${customEntries.length} custom · ${typicalEntries.length} defaults`
            : `${typicalEntries.length} default locations loaded`}
        </p>
      </div>

      {/* Search */}
      <div style={{ width: "100%", maxWidth: 500, padding: "20px 20px 0" }}>
        <div style={{ display: "flex", gap: 10 }}>
          <input
            ref={inputRef}
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && search()}
            placeholder="Search for any item…"
            style={{
              flex: 1, border: `1.5px solid ${C.border}`, borderRadius: 10,
              padding: "16px 16px", fontSize: 18, background: C.inputBg,
              color: C.text,
            }}
          />
          <button onClick={search} disabled={loading || !query.trim()} style={{
            background: loading ? C.border : C.accent, color: C.accentText,
            border: "none", borderRadius: 10, padding: "0 22px",
            fontSize: 15, letterSpacing: "0.08em", cursor: loading ? "default" : "pointer",
            fontWeight: 600, minWidth: 80,
          }}>{loading ? "…" : "FIND"}</button>
        </div>
      </div>

      {/* Result */}
      {result && (
        <div style={{ width: "100%", maxWidth: 500, padding: "16px 20px 0" }}>
          <div style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 12, padding: "22px 20px 18px" }}>

            {/* Item label + badge */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: C.subtext }}>{result.item}</span>
              <span style={{
                background: badgeInfo(result.confirmed ? "confirmed" : result.confidence).bg,
                color: "#fff", fontSize: 11, letterSpacing: "0.06em",
                padding: "4px 10px", borderRadius: 4,
              }}>
                {badgeInfo(result.confirmed ? "confirmed" : result.confidence).label}
              </span>
            </div>

            {/* Aisle — the hero text */}
            <div style={{ fontSize: 28, color: C.text, lineHeight: 1.3, marginBottom: result.note ? 8 : 0, fontFamily: "Georgia, serif" }}>
              {result.aisle}
            </div>

            {result.note && (
              <div style={{ fontSize: 13, color: C.subtext, marginTop: 6 }}>{result.note}</div>
            )}

            {/* Actions */}
            {!result.confirmed && (
              <div style={{ marginTop: 18, paddingTop: 16, borderTop: `1px solid ${C.borderLight}` }}>
                <div style={{ fontSize: 12, color: C.subtext, marginBottom: 10, letterSpacing: "0.06em" }}>
                  SAVE AISLE NUMBER
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ fontSize: 15, color: C.subtext, flexShrink: 0 }}>Aisle</span>
                  <input value={correction} onChange={(e) => setCorrection(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && submitCorrection()}
                    placeholder="7" inputMode="decimal"
                    style={{
                      width: 70, border: `1.5px solid ${C.border}`, borderRadius: 8,
                      padding: "12px 10px", fontSize: 22, background: C.inputBg,
                      color: C.text, textAlign: "center", fontFamily: "Georgia, serif",
                    }} />
                  <button onClick={submitCorrection} disabled={!correction.trim()} style={{
                    background: correction.trim() ? C.confirmed : C.border,
                    color: "#fff", border: "none", borderRadius: 8,
                    padding: "12px 20px", fontSize: 15, cursor: correction.trim() ? "pointer" : "default",
                    flex: 1,
                  }}>Save</button>
                  <button onClick={confirm} style={{
                    background: C.secondaryBtn, color: C.secondaryBtnText,
                    border: `1px solid ${C.border}`, borderRadius: 8,
                    padding: "12px 14px", fontSize: 13, cursor: "pointer", flexShrink: 0,
                  }}>✓ Correct</button>
                </div>
              </div>
            )}

            {result.confirmed && (
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${C.borderLight}`, fontSize: 13, color: C.confirmed }}>
                Saved to {activeStore.name}.
              </div>
            )}
          </div>
        </div>
      )}

      {/* Secondary actions */}
      <div style={{ width: "100%", maxWidth: 500, padding: "24px 20px 0", display: "flex", flexDirection: "column", gap: 12 }}>
        <AddCategoryPanel onAdd={handleAddCustom} C={C} />

        <button onClick={() => setShowMap(v => !v)} style={{
          background: "none", border: "none", fontSize: 13, color: C.subtext,
          cursor: "pointer", padding: "8px 0", textAlign: "left",
          letterSpacing: "0.08em",
        }}>
          {showMap ? "▲ hide" : "▼ show"} {activeStore.name} map
        </button>

        {showMap && (
          <div>
            <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
              {[["confirmed", `✓ confirmed (${confirmedEntries.length})`], ["custom", `★ custom (${customEntries.length})`], ["typical", `~ defaults (${typicalEntries.length})`]].map(([key, label]) => (
                <button key={key} onClick={() => setTab(key)} style={{
                  background: tab === key ? C.text : C.card,
                  color: tab === key ? C.bg : C.subtext,
                  border: `1px solid ${C.border}`, borderRadius: 6,
                  padding: "6px 12px", fontSize: 12, cursor: "pointer",
                }}>{label}</button>
              ))}
            </div>
            <div style={{ border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden" }}>
              {tabEntries[tab].sort(([a],[b]) => a.localeCompare(b)).map(([item, data], i) => (
                <div key={item} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "flex-start",
                  padding: "10px 14px", gap: 12,
                  background: i % 2 === 0 ? C.card : C.rowAlt,
                  borderBottom: `1px solid ${C.borderLight}`, fontSize: 13,
                }}>
                  <span style={{ color: C.text, flexShrink: 0 }}>{item}</span>
                  <span style={{ color: C.subtext, textAlign: "right" }}>{data.zone}</span>
                </div>
              ))}
              {tabEntries[tab].length === 0 && (
                <div style={{ padding: "16px 14px", color: C.subtext, fontSize: 13 }}>
                  {tab === "confirmed" ? "No confirmed locations yet — search and confirm as you shop." : tab === "custom" ? "No custom categories yet." : "No defaults."}
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SafewayFinder />);
</script>
</body>
</html>
